<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<title>DAME GAME</title>
<style>
body{font-family:Arial;text-align:center;background:#222;color:white}
.board{display:grid;grid-template-columns:repeat(8,70px);margin:auto;width:560px}
.cell{width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.dark{background:#7a4b2b}
.light{background:#f0d9b5}
.piece{width:55px;height:55px;border-radius:50%;cursor:pointer}
.white{background:white}
.black{background:black}
.king{border:4px solid gold; position: relative;}
.king::after{
  content: "👑"; /* ikimenyetso cy'ikamba */
  position: absolute;
  font-size: 24px;
  top: 15px;
  left: 15px;
}
</style>
</head>
<body>

<h2>DAME</h2>
<div id="board" class="board"></div>
<h3 id="turn"></h3>

<script>
const board = document.getElementById("board");
const turnText = document.getElementById("turn");

let currentPlayer = "white";
let selected = null;

let game = [];

function createBoard(){
  board.innerHTML="";
  game=[];
  for(let r=0;r<8;r++){
    game[r]=[];
    for(let c=0;c<8;c++){
      let cell=document.createElement("div");
      cell.className="cell "+((r+c)%2?"dark":"light");
      cell.dataset.row=r;
      cell.dataset.col=c;

      if((r+c)%2){
        if(r<3) game[r][c]={color:"black",king:false};
        else if(r>4) game[r][c]={color:"white",king:false};
        else game[r][c]=null;
      }

      cell.onclick=()=>cellClick(r,c);
      board.appendChild(cell);
    }
  }
  draw();
}

function draw(){
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="");

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      if(game[r][c]){
        let piece=document.createElement("div");
        piece.className="piece "+game[r][c].color;
        if(game[r][c].king) piece.classList.add("king");
        board.children[r*8+c].appendChild(piece);
      }
    }
  }

  turnText.innerText="Turn: "+currentPlayer;
}

function cellClick(r,c){
  let piece=game[r][c];

  if(selected){
    move(selected.r,selected.c,r,c);
    selected=null;
    draw();
    return;
  }

  if(piece && piece.color===currentPlayer){
    selected={r,c};
  }
}

function move(r1,c1,r2,c2){
  let piece=game[r1][c1];
  if(!piece) return;

  let dr=r2-r1;
  let dc=c2-c1;

  // simple move (None capture) yemerewe igihe nta capture ihari
  if(Math.abs(dr)==1 && Math.abs(dc)==1){
    if(piece.color==="white" && dr==-1 || piece.color==="black" && dr==1 || piece.king){
      if(!game[r2][c2]){
        game[r2][c2]=piece;
        game[r1][c1]=null;
        kingCheck(r2,piece);
        changeTurn();
      }
    }
  }

  // capture
  if(Math.abs(dr)==2 && Math.abs(dc)==2){
    let mr=r1+dr/2;
    let mc=c1+dc/2;
    if(game[mr][mc] && game[mr][mc].color!==piece.color){
      game[r2][c2]=piece;
      game[r1][c1]=null;
      game[mr][mc]=null;
      kingCheck(r2,piece);

      if(!canCaptureAgain(r2,c2)){
        changeTurn();
      }
    }
  }
}

function kingCheck(r,piece){
  if(piece.color==="white" && r==0 && !piece.king) piece.king=true;
  if(piece.color==="black" && r==7 && !piece.king) piece.king=true;
}

function changeTurn(){
  currentPlayer=currentPlayer==="white"?"black":"white";
}

function mustCapture(){
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      if(game[r][c] && game[r][c].color===currentPlayer){
        if(canCaptureAgain(r,c)) return true;
      }
    }
  }
  return false;
}

function canCaptureAgain(r,c){
  let dirs=[[2,2],[2,-2],[-2,2],[-2,-2]];
  for(let d of dirs){
    let r2=r+d[0], c2=c+d[1];
    let mr=r+d[0]/2, mc=c+d[1]/2;
    if(r2>=0 && r2<8 && c2>=0 && c2<8){
      if(!game[r2][c2] && game[mr][mc] && game[mr][mc].color!==game[r][c].color){
        return true;
      }
    }
  }
  return false;
}

createBoard();
</script>

</body>
</html>
