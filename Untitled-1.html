<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkers Game</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#5c3b1e;
    font-family:Arial;
}

.board{
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    border:8px solid #caa472;
}

.cell{
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.dark{ background:#7a4b27; }
.light{ background:#e3c39b; }

.piece{
    width:50px;
    height:50px;
    border-radius:50%;
    cursor:pointer;
}

.white{ background:white; }
.black{ background:black; }

.selected{
    outline:4px solid yellow;
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");
let selected = null;
let currentPlayer = "white";

function createBoard(){
    for(let row=0;row<8;row++){
        for(let col=0;col<8;col++){

            const cell = document.createElement("div");
            cell.classList.add("cell");

            if((row+col)%2===0){
                cell.classList.add("light");
            }else{
                cell.classList.add("dark");

                // Add pieces
                if(row < 3){
                    addPiece(cell,"black");
                }
                if(row > 4){
                    addPiece(cell,"white");
                }
            }

            cell.dataset.row = row;
            cell.dataset.col = col;

            cell.addEventListener("click", () => movePiece(cell));

            board.appendChild(cell);
        }
    }
}

function addPiece(cell,color){
    const piece = document.createElement("div");
    piece.classList.add("piece",color);

    piece.addEventListener("click",(e)=>{
        if(piece.classList.contains(currentPlayer)){
            if(selected) selected.classList.remove("selected");
            selected = piece;
            piece.classList.add("selected");
        }
        e.stopPropagation();
    });

    cell.appendChild(piece);
}

function movePiece(cell){
    if(selected && cell.classList.contains("dark") && cell.children.length === 0){

        const fromRow = selected.parentElement.dataset.row;
        const fromCol = selected.parentElement.dataset.col;
        const toRow = cell.dataset.row;
        const toCol = cell.dataset.col;

        let dir = currentPlayer === "white" ? -1 : 1;

        // Normal move
        if(Math.abs(fromCol - toCol) === 1 && (toRow - fromRow) == dir){
            cell.appendChild(selected);
            changeTurn();
        }

        // Capture move
        if(Math.abs(fromCol - toCol) === 2 && (toRow - fromRow) == dir*2){
            let middleRow = (parseInt(fromRow)+parseInt(toRow))/2;
            let middleCol = (parseInt(fromCol)+parseInt(toCol))/2;

            let middleCell = document.querySelector(
                `[data-row='${middleRow}'][data-col='${middleCol}']`
            );

            if(middleCell.children.length &&
               !middleCell.children[0].classList.contains(currentPlayer)){

                middleCell.innerHTML = "";
                cell.appendChild(selected);
                changeTurn();
            }
        }
    }
}

function changeTurn(){
    selected.classList.remove("selected");
    selected = null;
    currentPlayer = currentPlayer === "white" ? "black" : "white";
}

createBoard();
</script>

</body>
</html>
