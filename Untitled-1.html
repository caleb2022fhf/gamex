<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dame Game</title>
<style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial;
    background: #222;
    color: white;
}

#board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    grid-template-rows: repeat(8, 70px);
    margin-top: 20px;
}

.square {
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.dark { background: #444; }
.light { background: #ddd; }

.piece {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
}

.black { background: black; }
.white { background: white; }

.king {
    border: 3px solid gold;
}

.selected {
    outline: 3px solid yellow;
}
</style>
</head>
<body>

<h1>Dame (Checkers)</h1>
<h2 id="turn">Turn: Black</h2>
<div id="board"></div>

<script>
const board = document.getElementById("board");
const turnDisplay = document.getElementById("turn");

let currentPlayer = "black";
let selected = null;
let gameBoard = [];

function createBoard() {
    board.innerHTML = "";
    gameBoard = [];

    for (let row = 0; row < 8; row++) {
        gameBoard[row] = [];

        for (let col = 0; col < 8; col++) {
            const square = document.createElement("div");
            square.classList.add("square");
            square.classList.add((row + col) % 2 === 0 ? "light" : "dark");
            square.dataset.row = row;
            square.dataset.col = col;

            square.addEventListener("click", handleClick);

            board.appendChild(square);

            if ((row + col) % 2 !== 0) {
                if (row < 3) gameBoard[row][col] = "white";
                else if (row > 4) gameBoard[row][col] = "black";
                else gameBoard[row][col] = null;
            } else {
                gameBoard[row][col] = null;
            }
        }
    }

    renderBoard();
}

function renderBoard() {
    document.querySelectorAll(".square").forEach(square => {
        square.innerHTML = "";
        const row = square.dataset.row;
        const col = square.dataset.col;
        const piece = gameBoard[row][col];

        if (piece) {
            const pieceDiv = document.createElement("div");
            pieceDiv.classList.add("piece", piece);

            if (piece.includes("king")) {
                pieceDiv.classList.add("king");
            }

            square.appendChild(pieceDiv);
        }
    });
}

function handleClick(e) {
    const square = e.currentTarget;
    const row = parseInt(square.dataset.row);
    const col = parseInt(square.dataset.col);

    const piece = gameBoard[row][col];

    if (piece && piece.startsWith(currentPlayer)) {
        selected = { row, col };
        return;
    }

    if (selected) {
        movePiece(selected.row, selected.col, row, col);
        selected = null;
    }
}

function movePiece(sr, sc, er, ec) {
    const piece = gameBoard[sr][sc];
    if (!piece) return;

    const direction = currentPlayer === "black" ? -1 : 1;
    const rowDiff = er - sr;
    const colDiff = ec - sc;

    if (Math.abs(colDiff) === 1 && rowDiff === direction && !gameBoard[er][ec]) {
        gameBoard[er][ec] = piece;
        gameBoard[sr][sc] = null;
    }
    else if (Math.abs(colDiff) === 2 && rowDiff === direction * 2) {
        const midRow = (sr + er) / 2;
        const midCol = (sc + ec) / 2;

        if (gameBoard[midRow][midCol] &&
            !gameBoard[midRow][midCol].startsWith(currentPlayer)) {

            gameBoard[er][ec] = piece;
            gameBoard[sr][sc] = null;
            gameBoard[midRow][midCol] = null;
        }
    } else {
        return;
    }

    if (currentPlayer === "black" && er === 0)
        gameBoard[er][ec] = "black king";
    if (currentPlayer === "white" && er === 7)
        gameBoard[er][ec] = "white king";

    currentPlayer = currentPlayer === "black" ? "white" : "black";
    turnDisplay.textContent = "Turn: " + currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1);

    renderBoard();
}

createBoard();
</script>

</body>
</html>
