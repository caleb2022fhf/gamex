<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dame</title>

<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#5c3b1e;}
.board{display:grid;grid-template-columns:repeat(8,70px);}
.cell{width:70px;height:70px;display:flex;justify-content:center;align-items:center;}
.dark{background:#7a4b27;}
.light{background:#e3c39b;}
.piece{width:50px;height:50px;border-radius:50%;cursor:pointer;}
.white{background:white;}
.black{background:black;}
.selected{outline:4px solid yellow;}
</style>
</head>

<body>
<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");
let selected = null;
let turn = "white";

function createBoard(){
for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let cell=document.createElement("div");
cell.className="cell "+((r+c)%2?"dark":"light");
cell.dataset.row=r;
cell.dataset.col=c;

if((r+c)%2){
if(r<3)addPiece(cell,"black");
if(r>4)addPiece(cell,"white");
}

cell.onclick=()=>move(cell);
board.appendChild(cell);
}}
}

function addPiece(cell,color){
let p=document.createElement("div");
p.className="piece "+color;

p.onclick=(e)=>{
if(p.classList.contains(turn)){
clearSelect();
selected=p;
p.classList.add("selected");
}
e.stopPropagation();
};

cell.appendChild(p);
}

function clearSelect(){
if(selected)selected.classList.remove("selected");
}

function move(cell){
if(!selected || cell.children.length) return;

let fr=selected.parentElement.dataset.row*1;
let fc=selected.parentElement.dataset.col*1;
let tr=cell.dataset.row*1;
let tc=cell.dataset.col*1;

if(Math.abs(fr-tr)==1 && Math.abs(fc-tc)==1){
cell.appendChild(selected);
endTurn();
}

if(Math.abs(fr-tr)==2 && Math.abs(fc-tc)==2){
let mr=(fr+tr)/2;
let mc=(fc+tc)/2;

let mid=document.querySelector(`[data-row='${mr}'][data-col='${mc}']`);

if(mid.children.length &&
!mid.children[0].classList.contains(turn)){

mid.innerHTML="";
cell.appendChild(selected);

if(canEatAgain(selected)){
selected.classList.add("selected");
}else endTurn();
}
}
}

function canEatAgain(p){
let r=p.parentElement.dataset.row*1;
let c=p.parentElement.dataset.col*1;

let enemy=turn=="white"?"black":"white";

let dirs=[[2,2],[2,-2],[-2,2],[-2,-2]];

for(let d of dirs){

let mr=r+d[0]/2;
let mc=c+d[1]/2;

let tr=r+d[0];
let tc=c+d[1];

let mid=document.querySelector(`[data-row='${mr}'][data-col='${mc}']`);
let target=document.querySelector(`[data-row='${tr}'][data-col='${tc}']`);

if(mid && target &&
mid.children.length &&
mid.children[0].classList.contains(enemy) &&
!target.children.length){
return true;
}
}

return false;
}

function endTurn(){
clearSelect();
selected=null;
turn = turn=="white"?"black":"white";
}

createBoard();
</script>
</body>
</html>
