<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<title>Dame – Official (Multiple Jumps)</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: #eee;
        flex-direction: column;
    }
    h1 {
        margin: 10px 0 5px;
        font-size: 2.2rem;
        text-shadow: 0 0 10px #444;
    }
    #turn {
        padding: 12px 30px;
        border-radius: 12px;
        font-size: 1.4rem;
        font-weight: bold;
        margin: 15px 0 25px;
        transition: all 0.4s;
        min-width: 180px;
        text-align: center;
    }
    .turn-black { background: #000; color: #fff; box-shadow: 0 0 25px #fff8; }
    .turn-white { background: #fff; color: #000; box-shadow: 0 0 25px #ffeb3b; }

    #board {
        display: grid;
        grid-template-columns: repeat(8, 80px);
        grid-template-rows: repeat(8, 80px);
        background: #333;
        border: 8px solid #444;
        box-shadow: 0 0 30px #000;
        margin: 0 auto;
    }
    .square {
        width: 80px;
        height: 80px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }
    .light { background: #eee; }
    .dark  { background: #555; }

    .piece {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.15s;
    }
    .piece:hover { transform: scale(1.12); }
    .black { background: #000; border: 2px solid #222; }
    .white { background: #fff; border: 2px solid #ccc; }
    .king  { border: 4px solid gold; box-shadow: 0 0 12px gold; }

    /* Animation iyo ukanze */
    @keyframes eat {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.4); }
        100% { transform: scale(1); }
    }
    .eating { animation: eat 0.5s ease-in-out; }

    .selected {
        box-shadow: 0 0 0 5px #0f0;
        transform: scale(1.15);
    }
</style>
</head>
<body>

<h1>Dame (Checkers)</h1>
<h2 id="turn">Urukino: Umukara</h2>

<div id="board"></div>

<script>
const boardEl = document.getElementById("board");
const turnEl   = document.getElementById("turn");

let currentPlayer = "black";       // black cyangwa white
let selected = null;
let mustContinueJump = false;
let gameBoard = [];

function initBoard() {
    boardEl.innerHTML = "";
    gameBoard = Array(8).fill().map(()=>Array(8).fill(null));

    for(let r = 0; r < 8; r++) {
        for(let c = 0; c < 8; c++) {
            const sq = document.createElement("div");
            sq.classList.add("square");
            sq.classList.add((r+c) % 2 === 0 ? "light" : "dark");
            sq.dataset.row = r;
            sq.dataset.col = c;
            sq.addEventListener("click", onSquareClick);
            boardEl.appendChild(sq);

            // Pieces zibanza (classic checkers setup)
            if ((r+c) % 2 !== 0) {
                if (r < 3)      gameBoard[r][c] = "white";
                else if (r > 4) gameBoard[r][c] = "black";
            }
        }
    }
    render();
    updateTurnDisplay();
}

function render() {
    document.querySelectorAll(".square").forEach(sq => {
        sq.innerHTML = "";
        const r = +sq.dataset.row;
        const c = +sq.dataset.col;
        const p = gameBoard[r][c];
        if (p) {
            const piece = document.createElement("div");
            piece.classList.add("piece");
            piece.classList.add(p.includes("black") ? "black" : "white");
            if (p.includes("king")) piece.classList.add("king");
            sq.appendChild(piece);
        }
    });
}

function updateTurnDisplay() {
    turnEl.classList.remove("turn-black", "turn-white");
    turnEl.className = currentPlayer === "black" ? "turn-black" : "turn-white";
    turnEl.textContent = `Urukino: ${currentPlayer === "black" ? "Umukara" : "Umweru"}`;
}

function onSquareClick(e) {
    const r = +e.currentTarget.dataset.row;
    const c = +e.currentTarget.dataset.col;

    // 1. Gufata piece yawe (select)
    if (gameBoard[r][c]?.startsWith(currentPlayer)) {
        if (mustContinueJump && (selected?.row !== r || selected?.col !== c)) {
            return; // uri mu multiple jump – ugomba gukomeza na piece imwe gusa
        }
        selected = {row: r, col: c};
        render(); // re-draw kubera animation / selected style
        e.currentTarget.querySelector(".piece")?.classList.add("selected");
        return;
    }

    // 2. Ugiye guhindura aho piece igeze (move / capture)
    if (selected) {
        tryMove(selected.row, selected.col, r, c);
    }
}

function getDirections(isKing) {
    if (isKing) return [[-1,-1], [-1,1], [1,-1], [1,1]];
    return currentPlayer === "black" ? [[-1,-1], [-1,1]] : [[1,-1], [1,1]];
}

function canCapture(fromR, fromC) {
    const piece = gameBoard[fromR][fromC];
    if (!piece) return false;
    const dirs = getDirections(piece.includes("king"));
    for (let [dr, dc] of dirs) {
        const midR = fromR + dr;
        const midC = fromC + dc;
        const endR = fromR + 2*dr;
        const endC = fromC + 2*dc;
        if (inBounds(endR, endC) &&
            gameBoard[midR]?.[midC] &&
            !gameBoard[midR][midC].startsWith(currentPlayer) &&
            !gameBoard[endR][endC]) {
            return true;
        }
    }
    return false;
}

function mustCaptureThisTurn() {
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (gameBoard[r][c]?.startsWith(currentPlayer) && canCapture(r, c))
                return true;
    return false;
}

function tryMove(sr, sc, er, ec) {
    if (!inBounds(er, ec)) return;
    const piece = gameBoard[sr][sc];
    if (!piece) return;

    const dr = er - sr;
    const dc = ec - sc;
    const isKing = piece.includes("king");
    const dirs = getDirections(isKing);
    const mustCap = mustCaptureThisTurn();

    // Simple move (1 square) – only if no capture possible anywhere
    for (let [ddr, ddc] of dirs) {
        if (!mustCap && dr === ddr && dc === ddc && !gameBoard[er][ec]) {
            doMove(sr, sc, er, ec, null);
            return;
        }
    }

    // Capture (jump over enemy)
    for (let [ddr, ddc] of dirs) {
        if (dr === 2*ddr && dc === 2*ddc) {
            const midR = sr + ddr;
            const midC = sc + ddc;
            const eaten = gameBoard[midR]?.[midC];

            if (inBounds(er, ec) &&
                eaten &&
                !eaten.startsWith(currentPlayer) &&
                !gameBoard[er][ec]) {

                doMove(sr, sc, er, ec, {r: midR, c: midC});
                return;
            }
        }
    }
}

function doMove(sr, sc, er, ec, captured) {
    const piece = gameBoard[sr][sc];
    gameBoard[er][ec] = piece;
    gameBoard[sr][sc] = null;

    if (captured) {
        gameBoard[captured.r][captured.c] = null;
        // Animation y'urya inka
        const eatenSq = document.querySelector(`[data-row="${captured.r}"][data-col="${captured.c}"] .piece`);
        if (eatenSq) eatenSq.classList.add("eating");
    }

    promoteIfNeeded(er, ec);

    // Check if can continue jumping with this same piece
    if (captured && canCapture(er, ec)) {
        mustContinueJump = true;
        selected = {row: er, col: ec};
        render();
        document.querySelector(`[data-row="${er}"][data-col="${ec}"] .piece`)?.classList.add("selected");
    } else {
        mustContinueJump = false;
        selected = null;
        currentPlayer = currentPlayer === "black" ? "white" : "black";
        updateTurnDisplay();
        checkGameOver();
    }

    render();
}

function promoteIfNeeded(r, c) {
    const p = gameBoard[r][c];
    if (p === "black" && r === 0)   gameBoard[r][c] = "black king";
    if (p === "white" && r === 7)   gameBoard[r][c] = "white king";
}

function checkGameOver() {
    let blackCount = 0, whiteCount = 0;
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++) {
            if (gameBoard[r][c]?.startsWith("black")) blackCount++;
            if (gameBoard[r][c]?.startsWith("white")) whiteCount++;
        }
    if (blackCount === 0) setTimeout(()=>alert("Umweru yatsinze!"), 300);
    if (whiteCount === 0) setTimeout(()=>alert("Umukara yatsinze!"), 300);
}

function inBounds(r, c) {
    return r >= 0 && r < 8 && c >= 0 && c < 8;
}

initBoard();
</script>
</body>
</html>
