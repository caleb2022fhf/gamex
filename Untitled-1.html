<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Official Dame Game Centered</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    flex-direction: column;
}

/* TURN DISPLAY */
#turn {
    padding: 10px 20px;
    border-radius: 10px;
    display: inline-block;
    transition: 0.3s;
    margin-bottom: 20px;
}

.turn-black {
    background: black;
    color: white;
    box-shadow: 0 0 20px white;
}

.turn-white {
    background: white;
    color: black;
    box-shadow: 0 0 20px yellow;
}

/* BOARD STYLING */
#board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    grid-template-rows: repeat(8, 70px);
    background: #444;
    box-shadow: 0 0 20px #000;
}

.square {
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.light { background: #ddd; }
.dark { background: #666; }

.piece {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
}

.black { background: black; }
.white { background: white; }

.king { border: 3px solid gold; }

/* CALEB ANIMATION */
@keyframes caleb {
    0% { transform: scale(1); box-shadow: 0 0 0px gold; }
    50% { transform: scale(1.25); box-shadow: 0 0 30px gold; }
    100% { transform: scale(1); box-shadow: 0 0 0px gold; }
}

.caleb {
    animation: caleb 0.6s ease-in-out;
}
</style>
</head>
<body>

<h1>Official Dame (Checkers)</h1>
<h2 id="turn">Turn: Black</h2>
<div id="board"></div>

<script>
const board = document.getElementById("board");
const turnDisplay = document.getElementById("turn");

let currentPlayer = "black";
let selected = null;
let mustContinueJump = false;
let gameBoard = [];

function createBoard() {
    board.innerHTML = "";
    gameBoard = [];

    for (let r=0;r<8;r++){
        gameBoard[r]=[];
        for(let c=0;c<8;c++){
            const sq=document.createElement("div");
            sq.classList.add("square");
            sq.classList.add((r+c)%2===0?"light":"dark");
            sq.dataset.row=r;
            sq.dataset.col=c;
            sq.addEventListener("click",handleClick);
            board.appendChild(sq);

            if((r+c)%2!==0){
                if(r<3) gameBoard[r][c]="white";
                else if(r>4) gameBoard[r][c]="black";
                else gameBoard[r][c]=null;
            } else gameBoard[r][c]=null;
        }
    }
    render();
    updateTurnColor();
}

function render(){
    document.querySelectorAll(".square").forEach(sq=>{
        sq.innerHTML="";
        const r=sq.dataset.row;
        const c=sq.dataset.col;
        const piece=gameBoard[r][c];

        if(piece){
            const p=document.createElement("div");
            p.classList.add("piece");

            if(piece.includes("white")) p.classList.add("white");
            else p.classList.add("black");

            if(piece.includes("king")) p.classList.add("king");

            sq.appendChild(p);
        }
    });
}

function updateTurnColor(){
    turnDisplay.classList.remove("turn-black","turn-white");
    if(currentPlayer==="black"){
        turnDisplay.classList.add("turn-black");
    } else {
        turnDisplay.classList.add("turn-white");
    }
}

function handleClick(e){
    const r=parseInt(e.currentTarget.dataset.row);
    const c=parseInt(e.currentTarget.dataset.col);
    const piece=gameBoard[r][c];

    if(piece && piece.startsWith(currentPlayer)){
        if(mustContinueJump && !(selected && selected.row===r && selected.col===c))
            return;

        selected={row:r,col:c};

        // CALEB animation
        const pieceDiv = e.currentTarget.querySelector(".piece");
        if(pieceDiv){
            pieceDiv.classList.add("caleb");
            setTimeout(()=>{
                pieceDiv.classList.remove("caleb");
            },600);
        }
        return;
    }

    if(selected){
        move(selected.row,selected.col,r,c);
    }
}

function getDirections(piece){
    if(piece.includes("king"))
        return [[1,1],[1,-1],[-1,1],[-1,-1]];
    return currentPlayer==="black"?[[-1,1],[-1,-1]]:[[1,1],[1,-1]];
}

function hasCapture(r,c){
    const piece=gameBoard[r][c];
    const dirs=getDirections(piece);
    for(let [dr,dc] of dirs){
        let r1=r+dr, c1=c+dc;
        let r2=r+2*dr, c2=c+2*dc;
        if(inBounds(r2,c2) &&
           gameBoard[r1][c1] &&
           !gameBoard[r1][c1].startsWith(currentPlayer) &&
           !gameBoard[r2][c2]){
            return true;
        }
    }
    return false;
}

function playerMustCapture(){
    for(let r=0;r<8;r++)
        for(let c=0;c<8;c++)
            if(gameBoard[r][c] &&
               gameBoard[r][c].startsWith(currentPlayer) &&
               hasCapture(r,c))
               return true;
    return false;
}

function move(sr,sc,er,ec){
    const piece=gameBoard[sr][sc];
    if(!piece) return;

    const dr=er-sr;
    const dc=ec-sc;
    const dirs=getDirections(piece);
    const mustCap=playerMustCapture();

    for(let [d1,d2] of dirs){

        if(!mustCap && dr===d1 && dc===d2 && !gameBoard[er][ec]){
            gameBoard[er][ec]=piece;
            gameBoard[sr][sc]=null;
            promote(er,ec);
            switchTurn();
            return;
        }

        if(dr===2*d1 && dc===2*d2){
            let midR=sr+d1;
            let midC=sc+d2;
            if(inBounds(er,ec) &&
               gameBoard[midR][midC] &&
               !gameBoard[midR][midC].startsWith(currentPlayer) &&
               !gameBoard[er][ec]){

                gameBoard[er][ec]=piece;
                gameBoard[sr][sc]=null;
                gameBoard[midR][midC]=null;
                promote(er,ec);

                if(hasCapture(er,ec)){
                    selected={row:er,col:ec};
                    mustContinueJump=true;
                } else {
                    mustContinueJump=false;
                    switchTurn();
                }
                checkWin();
                return;
            }
        }
    }
}

function promote(r,c){
    if(currentPlayer==="black" && r===0)
        gameBoard[r][c]="black king";
    if(currentPlayer==="white" && r===7)
        gameBoard[r][c]="white king";
}

function switchTurn(){
    selected=null;
    currentPlayer=currentPlayer==="black"?"white":"black";
    turnDisplay.textContent="Turn: "+currentPlayer.charAt(0).toUpperCase()+currentPlayer.slice(1);
    updateTurnColor();
    render();
}

function checkWin(){
    let black=0, white=0;
    for(let r=0;r<8;r++)
        for(let c=0;c<8;c++){
            if(gameBoard[r][c]?.startsWith("black")) black++;
            if(gameBoard[r][c]?.startsWith("white")) white++;
        }
    if(black===0) alert("White Wins!");
    if(white===0) alert("Black Wins!");
}

function inBounds(r,c){
    return r>=0 && r<8 && c>=0 && c<8;
}

createBoard();
</script>

</body>
</html>
