<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8-Ball Pool</title>
<style>
    body {
        margin: 0;
        background: #0b3d2e;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    #gameContainer {
        position: relative;
        width: 900px;
        margin: 20px auto;
    }

    canvas {
        background: #1e8449;
        border: 15px solid #5d4037;
        border-radius: 10px;
    }

    #instructions {
        margin-top: 15px;
        background: #145a32;
        padding: 10px;
        border-radius: 8px;
    }
</style>
</head>
<body>

<h1>🎱 8-Ball Pool Game</h1>

<div id="gameContainer">
    <canvas id="table" width="900" height="450"></canvas>
</div>

<div id="instructions">
    <h3>Game Instructions</h3>
    <p>1️⃣ Click anywhere to shoot the cue ball.</p>
    <p>2️⃣ Pocket a ball to continue your turn.</p>
    <p>3️⃣ First pocketed ball decides Solids or Stripes.</p>
    <p>4️⃣ Pocket all your balls, then pocket the 8-ball to win.</p>
</div>

<script>
const canvas = document.getElementById("table");
const ctx = canvas.getContext("2d");

const pockets = [
    {x:0,y:0}, {x:450,y:0}, {x:900,y:0},
    {x:0,y:450}, {x:450,y:450}, {x:900,y:450}
];

let balls = [];

// Draw table pockets
function drawPockets() {
    ctx.fillStyle = "black";
    pockets.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 25, 0, Math.PI*2);
        ctx.fill();
    });
}

// Create ball
function createBall(x,y,color,number=null) {
    return {x,y,radius:12,color,number};
}

// Setup balls (triangle rack)
function setupBalls() {
    let startX = 650;
    let startY = 225;
    let row = 5;
    let colors = ["yellow","blue","red","purple","orange",
                  "green","maroon","black",
                  "yellow","blue","red","purple",
                  "orange","green","maroon"];

    let index = 0;

    for(let i=0;i<row;i++){
        for(let j=0;j<=i;j++){
            balls.push(createBall(
                startX + i*25,
                startY - (i*12) + j*25,
                colors[index],
                index+1
            ));
            index++;
        }
    }

    // Cue ball
    balls.push(createBall(200,225,"white",0));
}

// Draw balls
function drawBalls() {
    balls.forEach(ball=>{
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = ball.color;
        ctx.fill();
    });
}

// Main draw
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawPockets();
    drawBalls();
}

setupBalls();
draw();
</script>

</body>
</html>
