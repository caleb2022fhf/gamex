<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let balls = [];
let pockets = [];

let aiming = false;
let holdStart = 0;
let currentPower = 0;
let maxPower = 15;
let mouseX = 0;
let mouseY = 0;

class Ball{
  constructor(x,y,color){
    this.x=x;
    this.y=y;
    this.color=color;
    this.radius=10;
    this.dx=0;
    this.dy=0;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle=this.color;
    ctx.fill();
  }

  update(){
    this.x+=this.dx;
    this.y+=this.dy;

    this.dx*=0.99;
    this.dy*=0.99;

    if(this.x<20 || this.x>880) this.dx*=-1;
    if(this.y<20 || this.y>480) this.dy*=-1;
  }
}

function createBalls(){
  balls.push(new Ball(200,250,"white"));

  let colors=["yellow","blue","red","purple","orange","green","brown","black"];
  let startX=650;
  let startY=250;
  let offset = 0;

  colors.forEach((color,i)=>{
    balls.push(new Ball(startX + offset, startY + (i*22 - 80), color));
    if(i===3) offset = 22;
  });
}

function createPockets(){
  pockets = [
    {x:10,y:10},{x:450,y:10},{x:890,y:10},
    {x:10,y:490},{x:450,y:490},{x:890,y:490}
  ];
}

function drawPockets(){
  pockets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,18,0,Math.PI*2);
    ctx.fillStyle="black";
    ctx.fill();
  });
}

canvas.addEventListener("mousemove",(e)=>{
  let rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

canvas.addEventListener("mousedown",()=>{
  aiming = true;
  holdStart = Date.now();
});

canvas.addEventListener("mouseup",()=>{
  if(!aiming) return;

  let holdTime = Date.now() - holdStart;
  currentPower = Math.min(holdTime / 100, maxPower);

  let cueBall = balls[0];
  let angle = Math.atan2(mouseY-cueBall.y, mouseX-cueBall.x);

  cueBall.dx = Math.cos(angle) * currentPower;
  cueBall.dy = Math.sin(angle) * currentPower;

  aiming = false;
  currentPower = 0;
});

function drawCue(){
  if(!aiming) return;

  let cueBall = balls[0];
  let angle = Math.atan2(mouseY-cueBall.y, mouseX-cueBall.x);

  let pullBack = currentPower * 5;

  let startX = cueBall.x - Math.cos(angle) * (20 + pullBack);
  let startY = cueBall.y - Math.sin(angle) * (20 + pullBack);

  let endX = cueBall.x - Math.cos(angle) * 120;
  let endY = cueBall.y - Math.sin(angle) * 120;

  ctx.beginPath();
  ctx.moveTo(startX,startY);
  ctx.lineTo(endX,endY);
  ctx.strokeStyle="white";
  ctx.lineWidth=4;
  ctx.stroke();

  let holdTime = Date.now() - holdStart;
  currentPower = Math.min(holdTime / 100, maxPower);
}

function detectPocket(){
  balls.forEach((ball,index)=>{
    pockets.forEach(p=>{
      let dist = Math.hypot(ball.x-p.x, ball.y-p.y);
      if(dist<15){
        if(index!==0) balls.splice(index,1);
        else{
          ball.x=200;
          ball.y=250;
          ball.dx=0;
          ball.dy=0;
        }
      }
    });
  });
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPockets();

  balls.forEach(ball=>{
    ball.update();
    ball.draw();
  });

  drawCue();
  detectPocket();

  requestAnimationFrame(gameLoop);
}

createBalls();
createPockets();
gameLoop();
</script>
